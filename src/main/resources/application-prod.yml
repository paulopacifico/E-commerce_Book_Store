# Production profile: no default for JWT secret — set JWT_SECRET with at least
# 32 bytes of entropy (and optionally JWT_EXPIRATION, JWT_REFRESH_EXPIRATION)
# in the environment or the app will fail at startup.
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    defer-datasource-initialization: false
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

app:
  security:
    cors:
      allowed-origins:
        - ${CORS_ALLOWED_ORIGIN}
      allowed-origin-patterns: []

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:false}

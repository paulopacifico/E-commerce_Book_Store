<div class="order-list-page">
  <h1 class="page-title">My Orders</h1>

  @if (orders$ | async; as orders) {
    @if (orders.length === 0) {
      <div class="empty-state">
        <p class="empty-message">You have no orders yet.</p>
        <a routerLink="/books" class="btn btn-primary">Browse Books</a>
      </div>
    } @else {
      <div class="order-list">
        @for (order of orders; track order.id) {
          <a [routerLink]="['/orders', order.id]" class="order-card">
            <div class="order-card-main">
              <span class="order-id">Order #{{ order.id }}</span>
              <span class="order-date">{{ order.createdAt | date : 'mediumDate' }}</span>
              <span class="order-status" [class]="'status-' + order.status.toLowerCase()">{{ order.status }}</span>
            </div>
            <span class="order-total">{{ order.totalAmount | currency : 'EUR' }}</span>
          </a>
        }
      </div>
    }
  }
</div>

<footer class="footer" role="contentinfo">
  <div class="footer-inner">
    <div class="footer-brand">
      <span class="store-name">📚 Book Store</span>
      <p class="copyright">&copy; {{ currentYear }} Book Store. All rights reserved.</p>
    </div>

    <nav class="footer-links" aria-label="Footer navigation">
      <a routerLink="/about" class="footer-link">About</a>
      <a routerLink="/contact" class="footer-link">Contact</a>
      <a routerLink="/faq" class="footer-link">FAQ</a>
    </nav>

    <div class="social" aria-label="Social media">
      <a
        href="https://twitter.com"
        target="_blank"
        rel="noopener noreferrer"
        class="social-link"
        aria-label="Twitter"
      >
        <span aria-hidden="true">𝕏</span>
      </a>
      <a
        href="https://facebook.com"
        target="_blank"
        rel="noopener noreferrer"
        class="social-link"
        aria-label="Facebook"
      >
        <span aria-hidden="true">f</span>
      </a>
      <a
        href="https://instagram.com"
        target="_blank"
        rel="noopener noreferrer"
        class="social-link"
        aria-label="Instagram"
      >
        <span aria-hidden="true">📷</span>
      </a>
      <a
        href="https://linkedin.com"
        target="_blank"
        rel="noopener noreferrer"
        class="social-link"
        aria-label="LinkedIn"
      >
        <span aria-hidden="true">in</span>
      </a>
    </div>
  </div>
</footer>

<header class="header-toolbar" role="banner">
  <div class="toolbar-row">
    <a routerLink="/" class="logo" (click)="closeMobileMenu()" aria-label="Home">
      <svg
        class="logo-icon"
        xmlns="http://www.w3.org/2000/svg"
        width="22"
        height="22"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
        focusable="false"
      >
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <span>Book Store</span>
    </a>

    <button
      type="button"
      class="hamburger"
      id="mobile-menu-trigger"
      data-mobile-menu-trigger
      [class.open]="mobileMenuOpen()"
      [attr.aria-expanded]="showNavLinks()"
      aria-controls="site-navigation"
      [attr.aria-label]="showNavLinks() ? 'Close navigation menu' : 'Open navigation menu'"
      (click)="toggleMobileMenu()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav
      id="site-navigation"
      class="nav-section"
      [class.open]="showNavLinks()"
      aria-label="Primary"
      [attr.aria-hidden]="isMobile() ? !mobileMenuOpen() : null"
    >
      <div class="nav-links">
        <a
          routerLink="/"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMobileMenu()"
          >Home</a
        >
        <a routerLink="/books" routerLinkActive="active" (click)="closeMobileMenu()">Books</a>
        <a routerLink="/categories" routerLinkActive="active" (click)="closeMobileMenu()"
          >Categories</a
        >
      </div>

      <div class="search-wrap">
        <input
          type="search"
          class="search-input"
          placeholder="Search books..."
          [value]="searchQuery()"
          (input)="searchQuery.set($any($event.target).value)"
          (keydown.enter)="onSearch()"
          aria-label="Search books"
        />
        <button type="button" class="search-btn" (click)="onSearch()" aria-label="Search">
          Search
        </button>
      </div>

      <div class="actions">
        <app-cart-icon></app-cart-icon>

        @if (isAuthenticated$ | async) {
          <div class="user-menu">
            <button
              type="button"
              class="menu-trigger"
              id="account-menu-trigger"
              data-user-menu-trigger
              aria-haspopup="menu"
              aria-controls="account-menu"
              [attr.aria-expanded]="userMenuOpen()"
              (keydown)="onUserMenuTriggerKeydown($event)"
              (click)="toggleUserMenu()"
            >
              <span>Account</span>
              <span class="menu-caret" aria-hidden="true">▾</span>
            </button>
            <div
              id="account-menu"
              class="dropdown"
              [class.show]="userMenuOpen()"
              role="menu"
              aria-labelledby="account-menu-trigger"
              [attr.aria-hidden]="!userMenuOpen()"
              (keydown)="onUserMenuListKeydown($event)"
            >
              <a
                routerLink="/orders"
                (click)="closeMobileMenu(); closeUserMenu()"
                role="menuitem"
                data-user-menu-item
                [attr.tabindex]="userMenuOpen() ? 0 : -1"
                >My Orders</a
              >
              <button
                type="button"
                (click)="logout()"
                role="menuitem"
                data-user-menu-item
                [attr.tabindex]="userMenuOpen() ? 0 : -1"
              >
                Logout
              </button>
            </div>
          </div>
        } @else {
          <div class="auth-buttons">
            <a routerLink="/login" class="btn btn-outline" (click)="closeMobileMenu()">Login</a>
            <a routerLink="/register" class="btn btn-primary" (click)="closeMobileMenu()"
              >Register</a
            >
          </div>
        }
      </div>
    </nav>
  </div>
</header>

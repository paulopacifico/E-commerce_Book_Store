name: Angular Frontend CI

on:
  push:
    branches: ["main", "master"]
    paths:
      - ".github/workflows/frontend.yml"
      - "bookstore-frontend/**"
      - "pom.xml"
      - "src/main/**"
  pull_request:
    branches: ["main", "master"]
    paths:
      - ".github/workflows/frontend.yml"
      - "bookstore-frontend/**"
      - "pom.xml"
      - "src/main/**"

jobs:
  check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bookstore-frontend

    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bookstore-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run frontend delivery gate
        run: npm run check

  purchase-funnel:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bookstore-frontend

    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bookstore-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run purchase-funnel smoke
        run: npm run test:e2e

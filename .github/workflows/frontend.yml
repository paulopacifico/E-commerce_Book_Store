name: Angular Frontend CI

on:
  push:
    branches: ["main", "master"]
    paths:
      - ".github/workflows/frontend.yml"
      - "bookstore-frontend/**"
      - "docker-compose.yml"
      - "pom.xml"
      - "src/main/**"
  pull_request:
    branches: ["main", "master"]
    paths:
      - ".github/workflows/frontend.yml"
      - "bookstore-frontend/**"
      - "docker-compose.yml"
      - "pom.xml"
      - "src/main/**"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bookstore-frontend

    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bookstore-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit dependency vulnerabilities
        run: npm run security:audit
      - name: Run frontend delivery gate
        run: npm run check

  purchase-funnel:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bookstore-frontend

    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bookstore-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run purchase-funnel smoke
        run: npm run test:e2e

  container:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Build frontend runtime image
        run: docker build --file bookstore-frontend/Dockerfile --tag bookstore-frontend:ci bookstore-frontend
